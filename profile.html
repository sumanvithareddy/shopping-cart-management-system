<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShopEase | My Profile</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            <i class="fa-solid fa-cart-shopping"></i>
            <h2>ShopEase</h2>
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="products.html">Products</a></li>

            <li><a href="wishlist.html">Wishlist</a></li>

            <li><a href="cart.html">Cart</a></li>

            <li><a href="profile.html" style="color:#ffd700;">Profile</a></li>

        </ul>

    </nav>

    <!-- Profile -->

    <section class="profile-container">

        <div class="profile-card">

            <img src="images/profile.png"
                 alt="Profile"
                 class="profile-image">

            <h2 id="userName">Guest User</h2>

            <p id="userEmail">guest@example.com</p>

            <button id="editBtn" class="edit-btn">
                Edit Profile
            </button>

        </div>

        <div class="profile-details">

            <h2>Account Details</h2>

            <div class="detail">

                <i class="fa-solid fa-user"></i>

                <span id="profileName">Guest User</span>

            </div>

            <div class="detail">

                <i class="fa-solid fa-envelope"></i>

                <span id="profileEmail">guest@example.com</span>

            </div>

            <div class="detail">

                <i class="fa-solid fa-phone"></i>

                <span id="profilePhone">+91 9876543210</span>

            </div>

            <div class="detail">

                <i class="fa-solid fa-location-dot"></i>

                <span id="profileAddress">Hyderabad, India</span>

            </div>

            <hr>

            <h2>Dashboard</h2>

            <div class="stats">

                <div class="box">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <h3 id="cartCount">0</h3>

                    <p>Cart Items</p>

                </div>

                <div class="box">

                    <i class="fa-solid fa-heart"></i>

                    <h3 id="wishlistCount">0</h3>

                    <p>Wishlist</p>

                </div>

                <div class="box">

                    <i class="fa-solid fa-box"></i>

                    <h3 id="orderCount">0</h3>

                    <p>Orders</p>

                </div>

            </div>

            <div class="buttons">

                <button class="logout-btn" onclick="logout()">
                    Logout
                </button>

            </div>

        </div>

    </section>

    <footer>

        <p>
            © 2026 ShopEase | User Profile
        </p>

    </footer>

    <script src="js/profile.js"></script>

</body>

</html>
